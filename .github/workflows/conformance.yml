name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # macOS arm64 runners have Metal, so the wgpu differential lane runs in CI.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install z3 (required for proved claims)
        run: brew install z3

      - uses: Swatinem/rust-cache@v2

      - name: Lint
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy --workspace --all-targets --features cpu -- -D warnings

      - name: Conformance (wgpu lane + proved claims)
        run: cargo test --workspace

      - name: Conformance (with cubecl-cpu lane)
        run: cargo test --workspace --features cpu

      - name: Defect demo (checks must catch the deliberately broken kernels)
        run: cargo run -p vericl-examples --bin conform
